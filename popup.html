<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>ILIAS Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-view">
    <h3>Nächste Abgaben</h3>
    <div id="deadline-list" class="loader">Lade Daten von ILIAS...</div>
    <button id="btn-settings">Einstellungen</button>
  </div>

  <div id="settings-view">
    <h3>Module konfigurieren</h3>
    
    <div id="modules-container"></div>

    <button id="btn-add" class="btn-secondary">+ Weiteres Modul hinzufügen</button>
    <button id="btn-save">Speichern & Aktualisieren</button>
    <button id="btn-back" class="btn-secondary">Zurück</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
