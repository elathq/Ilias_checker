<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>ILIAS Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-view">
    <h3>Nächste Abgaben</h3>
    <div id="deadline-list" class="loader">Lade Daten von ILIAS...</div>
    <button id="btn-settings">Einstellungen</button>
  </div>

  <div id="settings-view">
    <h3>Module konfigurieren</h3>
    
    <div class="input-group">
      <input type="text" id="name1" class="input-name" placeholder="Name (z.B. Programmierung)">
      <input type="text" id="url1" class="input-url" placeholder="ILIAS Link">
    </div>
    <div class="input-group">
      <input type="text" id="name2" class="input-name" placeholder="Name">
      <input type="text" id="url2" class="input-url" placeholder="ILIAS Link">
    </div>
    <div class="input-group">
      <input type="text" id="name3" class="input-name" placeholder="Name">
      <input type="text" id="url3" class="input-url" placeholder="ILIAS Link">
    </div>
    <div class="input-group">
      <input type="text" id="name4" class="input-name" placeholder="Name">
      <input type="text" id="url4" class="input-url" placeholder="ILIAS Link">
    </div>
    <div class="input-group">
      <input type="text" id="name5" class="input-name" placeholder="Name">
      <input type="text" id="url5" class="input-url" placeholder="ILIAS Link">
    </div>

    <button id="btn-save">Speichern & Aktualisieren</button>
    <button id="btn-back">Zurück</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
